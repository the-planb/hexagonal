parameters: ~

services:
  _defaults:
    autowire: true
    autoconfigure: true

  PlanB\Hexagonal\:
    resource: '../src'
    exclude: '../src/Infrastructure/Symfony/Bundle'

  PlanB\Hexagonal\Core\Cqrs\Command\CommandBusInterface:
    class: PlanB\Hexagonal\Infrastructure\Symfony\Cqrs\Command\CommandBus
    arguments:
      $commandBus: '@command.bus'

  PlanB\Hexagonal\Core\Cqrs\Query\QueryBusInterface:
    class: PlanB\Hexagonal\Infrastructure\Symfony\Cqrs\Query\QueryBus
    arguments:
      $queryBus: '@query.bus'

  PlanB\Hexagonal\Core\Cqrs\Event\EventBusInterface:
    class: PlanB\Hexagonal\Infrastructure\Symfony\Cqrs\Event\EventBus
    arguments:
      $eventBus: '@event.bus'

  PlanB\Hexagonal\Core\FileSystem\Adapter\FileWriter:
    arguments:
      $writers: !tagged_iterator hexagonal.fs.writer

  PlanB\Hexagonal\Core\FileSystem\Adapter\FileReader:
    arguments:
      $readers: !tagged_iterator hexagonal.fs.reader